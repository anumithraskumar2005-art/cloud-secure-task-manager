{% extends "base.html" %}

{% block content %}
<h2>Edit Task</h2>

<form method="POST" enctype="multipart/form-data">
    <label>Task Title:</label><br>
    <input type="text" name="title" value="{{ task.title }}" required><br><br>

    <label>Description:</label><br>
    <textarea name="description" rows="4" required>{{ task.description }}</textarea><br><br>

    <label>Status:</label><br>
    <select name="status" required>
        <option value="To Do" {% if task.status == "To Do" %}selected{% endif %}>To Do</option>
        <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
        <option value="Completed" {% if task.status == "Completed" %}selected{% endif %}>Completed</option>
    </select><br><br>
    <label>Replace Attachment:</label><br>
<input type="file" name="attachment"><br><br>

{% if task.attachment %}
    <p>Current attachment:
        <a href="{{ url_for('static', filename='uploads/' + task.attachment) }}" target="_blank">
            {{ task.attachment }}
        </a>
    </p>
{% endif %}

    <button type="submit">Update Task</button>
</form>

<br>
<a href="/dashboard">Back to Dashboard</a>
{% endblock %}
